pre-commit:
  jobs:
    - run: |
        bun --eval '
          const { spawnSync } = require("node:child_process");
          const staged = spawnSync("git", ["diff", "--name-only", "--staged", "--diff-filter=ACMR"], { encoding: "utf-8" });
          const filePattern = /\.(js|jsx|ts|tsx|json|jsonc|css)$/;
          const files = staged.stdout.split("\n").filter((file) => filePattern.test(file));
          if (files.length === 0) {
            process.exit(0);
          }
          const fix = spawnSync("bun", ["x", "ultracite", "fix", ...files], { stdio: "inherit" });
          process.exit(fix.status ?? 1);
        '
      glob:
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.json"
        - "**/*.jsonc"
        - "**/*.css"
      stage_fixed: true
