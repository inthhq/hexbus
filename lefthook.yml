pre-commit:
  jobs:
    - run: |
        bash -c '
          while IFS= read -r -d "" file; do
            bun x ultracite fix "$file"
          done < <(
            git diff --name-only --staged --diff-filter=ACMR -z |
              rg -z "\.(js|jsx|ts|tsx|json|jsonc|css)$" || true
          )
        '
      glob:
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.json"
        - "**/*.jsonc"
        - "**/*.css"
      stage_fixed: true
