pre-commit:
  jobs:
    - run: |
        files="$(git diff --name-only --staged --diff-filter=ACMR | rg '\.(js|jsx|ts|tsx|json|jsonc|css)$' || true)"
        [ -z "$files" ] || printf '%s\n' "$files" | tr '\n' '\0' | xargs -0 bun x ultracite fix
      glob:
        - "**/*.js"
        - "**/*.jsx"
        - "**/*.ts"
        - "**/*.tsx"
        - "**/*.json"
        - "**/*.jsonc"
        - "**/*.css"
      stage_fixed: true
